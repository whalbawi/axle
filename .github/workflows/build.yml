name: Axle CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]

jobs:
  format:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup environment
      run: ./tools/install-deps.sh

    - name: Run clang-format
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_COMMIT=${{ github.event.pull_request.base.sha }}
            THIS_COMMIT=${{ github.event.pull_request.head.sha }}
            git clang-format --diff $BASE_COMMIT $THIS_COMMIT
        else
            git clang-format --diff HEAD^
        fi

  lint-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
         submodules: recursive

    - name: Setup environment
      run: ./tools/install-deps.sh

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_ASM_COMPILER=clang
        -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)

    - name: Run clang-tidy
      run: cmake --build ${{github.workspace}}/build -t lint

  lint-linux:
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v6
      with:
         submodules: recursive

    - name: Setup environment
      run: ./tools/install-deps.sh

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_ASM_COMPILER=clang

    - name: Run clang-tidy
      run: cmake --build ${{github.workspace}}/build -t lint

  build:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-24.04-arm ]
        build_type:
          - -DAXLE_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=Release
          - -DAXLE_ENABLE_UBSAN=ON -DCMAKE_BUILD_TYPE=Release
          - -DAXLE_ENABLE_TSAN=ON -DCMAKE_BUILD_TYPE=Release
          - -DCMAKE_BUILD_TYPE=Release
          - -DCMAKE_BUILD_TYPE=Debug

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup environment
      run: ./tools/install-deps.sh

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build ${{ matrix.build_type }}
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_ASM_COMPILER=clang

    - name: Build
      run: cmake --build ${{github.workspace}}/build

    - name: Run unit tests
      run: ctest --test-dir ${{github.workspace}}/build -R unit-tests -V

  build-result:
    if: always()
    needs: [format, lint-macos, lint-linux, build]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          if [ "${{ needs.format.result }}" == "success" ] &&
             [ "${{ needs.lint-macos.result }}" == "success" ] &&
             [ "${{ needs.lint-linux.result }}" == "success" ] &&
             [ "${{ needs.build.result }}" == "success" ]; then
            echo "All jobs succeeded"
            exit 0
          else
            echo "One or more jobs failed"
            exit 1
          fi